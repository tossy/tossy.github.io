<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <nav class="nav-container">
      <a href="{{ '/' | relative_url }}" class="site-title">AI(愛)</a>
      <div class="nav-links">
        <a href="{{ '/coe/' | relative_url }}" class="nav-link nav-coe">CoE Log</a>
        <a href="{{ '/ai-ai/' | relative_url }}" class="nav-link nav-aiai">AI × 愛</a>
        <a href="{{ '/lifelog/' | relative_url }}" class="nav-link nav-life">Life Log</a>
      </div>
    </nav>
  </header>

  <main class="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>© {{ 'now' | date: "%Y" }} Toshi · <a href="https://github.com/tossy">GitHub</a></p>
  </footer>
</body>
</html>
